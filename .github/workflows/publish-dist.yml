name: Publish dist-app tag

# Builds the hosted editor app (dist-app/) and publishes it as an IMMUTABLE git tag that
# Bloom (BloomDesktop) consumes as a GitHub dependency:
#
#   "bloom-ai-image-tools": "BloomBooks/bloom-ai-image-tools#dist-v0.1.0"
#
# WHY A TAG (not npm, not a moving branch): Bloom is yarn 1 and cannot build this pnpm +
# vite-plus project on install, so it needs a prebuilt dist-app. Different Bloom branches
# need different editor builds (not always-latest), so each pins an exact, immutable ref.
# The tag holds dist-app/ plus a minimal, script-free package.json so yarn installs it as
# static files with no build step. The tag content is an orphan commit; master stays clean.
#
# The tag defaults to `dist-v<version>` (version from package.json). Publishing is refused
# if that tag already exists — bump the version (changeset) or pass a distinct `tag` input.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (default: dist-v<package.json version>)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: publish-dist
  cancel-in-progress: false

jobs:
  publish-dist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag name
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            VERSION="$(node -p "require('./package.json').version")"
            TAG="dist-v${VERSION}"
          fi
          echo "name=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: ${TAG}"

      - name: Refuse to overwrite an existing tag
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists. Tags are immutable; bump the version (changeset) or pass a distinct 'tag' input."
            exit 1
          fi

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24.12.0
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Build hosted app (dist-app)
        run: vp run build:app

      - name: Assemble publish tree
        run: |
          rm -rf .publish
          mkdir -p .publish
          cp -r dist-app .publish/dist-app
          node -e '
            const fs = require("fs");
            const src = JSON.parse(fs.readFileSync("package.json", "utf8"));
            const out = {
              name: src.name,
              version: src.version,
              private: false,
              description: "Prebuilt Bloom AI Image Editor app (dist-app), published for consumption by BloomDesktop as a GitHub dependency. Auto-generated by publish-dist.yml; do not edit by hand.",
              // Static files only: no scripts (so yarn 1 runs no build) and no dependencies.
              files: ["dist-app"]
            };
            fs.writeFileSync(".publish/package.json", JSON.stringify(out, null, 2) + "\n");
          '
          {
            echo "tag: ${{ steps.tag.outputs.name }}"
            echo "source-commit: ${GITHUB_SHA}"
            echo "source-ref: ${GITHUB_REF}"
          } > .publish/BUILD_INFO.txt

      - name: Publish tag
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          cd .publish
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "dist-app build for ${TAG} (source ${GITHUB_SHA})"
          git tag "${TAG}"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "refs/tags/${TAG}"
          echo "Published ${TAG}."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
