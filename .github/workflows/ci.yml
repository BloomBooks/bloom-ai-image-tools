name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24.12.0
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      # Formatting + lint + type-check. Formatting is also enforced locally by
      # the pre-commit hook; lint and type-check live here so they don't block
      # commits (which would tempt --no-verify and bypass formatting too).
      - name: Check format, lint, and types
        run: vp check
